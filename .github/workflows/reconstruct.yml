name: Reconstruct Flights

on:
  schedule:
    - cron: '*/15 * * * *'   # every 15 minutes
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: reconstruct
  # Safe to cancel a stale run: reconstruction is fully idempotent
  # (deterministic flight_id → INSERT OR REPLACE).
  cancel-in-progress: true

jobs:
  reconstruct:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout main (code)
        # Verify SHA: actions/checkout v5.0.1
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          ref: main
          path: code

      - name: Checkout data branch
        # Verify SHA: actions/checkout v5.0.1
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          ref: data
          path: data-branch
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git identity in data branch
        working-directory: data-branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Set up Python 3.11
        # Verify SHA: actions/setup-python v6.2.0
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: '3.11'

      - name: Reconstruct flights
        working-directory: code
        run: >-
          python flights.py
          --db-path ../data-branch/flights.db
          --data-dir ../data-branch
