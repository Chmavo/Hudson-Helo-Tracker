name: Secret Scanning

on:
  push:
    branches: ["main", "claude/**"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read
  security-events: write

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (full history for comprehensive scan)
        # Verify SHA: actions/checkout v4.2.2
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0

      - name: Install gitleaks (with checksum verification)
        run: |
          VERSION="8.18.4"
          curl -sSfL \
            "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" \
            -o /tmp/gitleaks.tar.gz
          curl -sSfL \
            "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_checksums.txt" \
            -o /tmp/gitleaks_checksums.txt
          cd /tmp && grep "linux_x64.tar.gz" gitleaks_checksums.txt | sha256sum -c
          sudo tar -xf /tmp/gitleaks.tar.gz -C /usr/local/bin gitleaks
          gitleaks version

      - name: Scan for secrets
        run: gitleaks detect --source . --config .gitleaks.toml --verbose --redact
