name: Build Dashboard

on:
  workflow_run:
    workflows: ["Reconstruct Flights"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: dashboard
  # Safe to cancel: the build is a pure read + overwrite of static files.
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # For workflow_run events, only proceed when reconstruction succeeded.
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Checkout main (code)
        # Verify SHA: actions/checkout v4.2.2
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: main
          path: code

      - name: Checkout data branch
        # Verify SHA: actions/checkout v4.2.2
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: data
          path: data-branch

      - name: Setup gh-pages workspace
        # Clones gh-pages if it already exists; initialises an orphan branch
        # on the very first run so the workflow is self-bootstrapping.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          ORIGIN="https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
          if git ls-remote --exit-code --heads "$ORIGIN" gh-pages > /dev/null 2>&1; then
            git clone --depth=1 --branch gh-pages "$ORIGIN" site
          else
            mkdir site
            git -C site init
            git -C site remote add origin "$ORIGIN"
            git -C site checkout --orphan gh-pages
          fi
          git -C site config user.name  "github-actions[bot]"
          git -C site config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Build dashboard
        # dashboard.py uses stdlib only — no pip install needed.
        run: python code/dashboard.py --db-path data-branch/flights.db --out-dir site

      - name: Deploy to gh-pages
        run: |
          git -C site add .
          if git -C site diff --cached --quiet; then
            echo "No changes to deploy"
            exit 0
          fi
          git -C site commit -m "dashboard: $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          git -C site push origin gh-pages
