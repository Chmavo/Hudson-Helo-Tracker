name: Build Dashboard

on:
  schedule:
    # Every 15 minutes — independent of the Reconstruct Flights workflow so
    # the dashboard always gets a fresh build even when harvest is running and
    # orphaning standalone reconstruct commits.
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: dashboard
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout main (code)
        # Verify SHA: actions/checkout v5.0.1
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          ref: main
          path: code

      - name: Checkout data branch
        # Verify SHA: actions/checkout v5.0.1
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          ref: data
          path: data-branch
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git identity in data branch
        working-directory: data-branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Set up Python 3.11
        # Verify SHA: actions/setup-python v6.2.0
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: '3.11'

      - name: Reconstruct flights
        # Runs flights.py directly so the dashboard always uses fresh
        # reconstruction, not whatever the data branch last committed.
        # commit_push() inside flights.py will try to persist the results;
        # if harvest is concurrently running it may fail gracefully — that is
        # fine because we use the local DB (not the pushed copy) for the build.
        working-directory: code
        run: >-
          python flights.py
          --db-path ../data-branch/flights.db
          --data-dir ../data-branch

      - name: Setup gh-pages workspace
        # Clones gh-pages if it already exists; initialises an orphan branch
        # on the very first run so the workflow is self-bootstrapping.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          ORIGIN="https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
          if git ls-remote --exit-code --heads "$ORIGIN" gh-pages > /dev/null 2>&1; then
            git clone --depth=1 --branch gh-pages "$ORIGIN" site
          else
            mkdir site
            git -C site init
            git -C site remote add origin "$ORIGIN"
            git -C site checkout --orphan gh-pages
          fi
          git -C site config user.name  "github-actions[bot]"
          git -C site config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Build dashboard
        # dashboard.py uses stdlib only — no pip install needed.
        run: python code/dashboard.py --db-path data-branch/flights.db --out-dir site

      - name: Deploy to gh-pages
        run: |
          git -C site add .
          if git -C site diff --cached --quiet; then
            echo "No changes to deploy"
            exit 0
          fi
          git -C site commit -m "dashboard: $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          git -C site push origin gh-pages
