name: Harvest ADS-B Data

on:
  # schedule disabled — re-enable by uncommenting the block below
  # schedule:
  #   - cron: '55 */5 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: harvest
  # Do NOT cancel a running harvester — queue the next one instead.
  # This prevents data loss during the cron boundary overlap window.
  cancel-in-progress: false

jobs:
  harvest:
    runs-on: ubuntu-latest
    timeout-minutes: 355   # just under the 6-hour Actions hard limit

    steps:
      - name: Checkout main (code)
        # Verify SHA: actions/checkout v5.0.1
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          ref: main
          path: code

      - name: Checkout data branch
        # Verify SHA: actions/checkout v5.0.1
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          ref: data
          path: data-branch
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git identity in data branch
        working-directory: data-branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Set up Python 3.11
        # Verify SHA: actions/setup-python v6.2.0
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests==2.31.0

      - name: Run harvester
        working-directory: code
        run: >-
          python harvester.py
          --duration 21000
          --db-path ../data-branch/flights.db
          --data-dir ../data-branch
